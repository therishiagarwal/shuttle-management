spring.application.name=shuttle-management

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:file:./data/shuttledb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# 'update' preserves existing data across restarts (was create-drop which wiped everything)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ── JWT ───────────────────────────────────────────────────────────────────────
# Override in production via environment variable: JWT_SECRET=<your-strong-secret>
jwt.secret=${JWT_SECRET:default-dev-secret-change-in-production-min-32-chars}
jwt.expiration-ms=36000000

# ── Fare calculation ──────────────────────────────────────────────────────────
# Points charged per km of Haversine distance between stops
fare.rate-per-km=2
# Peak hour windows (24h format). Multiplier applied during these windows.
fare.peak.morning-start=7
fare.peak.morning-end=9
fare.peak.evening-start=17
fare.peak.evening-end=19
fare.peak.multiplier=1.5

# ── Trip cancellation ─────────────────────────────────────────────────────────
# Minutes after booking within which a full refund is granted
trip.cancellation.full-refund-minutes=10

# ── University email validation ───────────────────────────────────────────────
# Change this to your institution's domain
university.email.domain=@university.edu

# ── Caching (Caffeine) ────────────────────────────────────────────────────────
spring.cache.type=caffeine
# TTL of 5 minutes; max 500 entries per cache region
cache.ttl-seconds=300
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=${cache.ttl-seconds}s

# ── Actuator ──────────────────────────────────────────────────────────────────
# Expose only the endpoints needed; full wildcard is disabled for safety
management.endpoints.web.exposure.include=health,metrics,loggers
# Show full health details only to authenticated ADMIN users
management.endpoint.health.show-details=when-authorized

# ── H2 Console (dev only) ─────────────────────────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
